<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Phantom of the Capitol</title>
    <style>
        :root {
            --primary-blue: #1a73e8;
            --dark-blue: #0d47a1;
            --light-blue: #e8f0fe;
            --pale-blue: #f5f9ff;
            --medium-blue: #4285f4;
            --dark-grey: #3c4043;
            --medium-grey: #5f6368;
            --light-grey: #f8f9fa;
            --white: #ffffff;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', sans-serif;
            line-height: 1.6;
            color: var(--dark-grey);
            background-color: var(--pale-blue);
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        header {
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 2rem 0;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 500;
        }
        
        .form-container {
            background-color: var(--white);
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            padding: 2.5rem;
            margin-bottom: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--medium-grey);
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #dfe1e5;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            transition: border 0.3s, box-shadow 0.3s;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--medium-blue);
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .btn {
            display: inline-block;
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn:hover {
            background-color: var(--dark-blue);
        }
        
        .btn-block {
            display: block;
            width: 100%;
        }
        
        .form-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--medium-grey);
            font-size: 0.9rem;
        }
        
        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--medium-grey);
            font-size: 0.9rem;
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 1rem;
            }
            
            .form-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Contact Phantom of the Capitol</h1>
        </div>
    </header>
    
    <main class="container">
        <div class="form-container">
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Your full name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                </div>
                
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject" required>
                        <option value="" disabled selected>Select a subject</option>
                        <option value="question">General Question</option>
                        <option value="contribution">Code Contribution</option>
                        <option value="data">Data Inquiry</option>
                        <option value="media">Media Inquiry</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" required placeholder="Type your message here..."></textarea>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn btn-block">Send Message</button>
                </div>
                
                <div class="form-footer">
                    We'll respond to your inquiry as soon as possible.
                </div>
            </form>
        </div>
    </main>
    
    <footer>
        <div class="container">
            <p>A project by the <a href="https://www.eff.org">Electronic Frontier Foundation</a></p>
        </div>
    </footer>
    
    <script>
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            // Form submission logic would go here
            alert('Thank you for your message! We will get back to you soon.');
            this.reset();
        });
    </script>
</body>
</html>
